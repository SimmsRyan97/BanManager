name: BanManager
version: 1.0.5
main: com.banmanager.BanManagerPlugin
api-version: 1.18
author: WhiteIverson97
description: Rule-based warning, kick and ban management system.

commands:
  warn:
    description: Warn a player for a configured rule.
    usage: /warn <player> <rule> [reason]
    permission: banmanager.warn
  warns:
    description: View warning history for a player.
    usage: /warns <player>
  unwarn:
    description: Remove warning entries from a player.
    usage: /unwarn <player> <count|all>
    permission: banmanager.unwarn
  kick:
    description: Kick a player with a reason.
    usage: /kick <player> [reason]
    permission: banmanager.kick
  tempban:
    description: Temporarily ban a player.
    usage: /tempban <player> <duration> [reason]
    permission: banmanager.tempban
  ban:
    description: Permanently ban a player.
    usage: /ban <player> [reason]
    permission: banmanager.ban
  ipban:
    description: Ban a player's last known IP.
    usage: /ipban <player> [reason]
    permission: banmanager.ipban
  unban:
    description: Remove active ban from a player.
    usage: /unban <player>
    permission: banmanager.unban
  clearpunishments:
    description: Remove punishment history entries from a player.
    usage: /clearpunishments <player> <count|all>
    permission: banmanager.clearpunishments
  bmhistory:
    description: Show warning and sanction history.
    usage: /bmhistory <player>
    permission: banmanager.history
    aliases: [dmhistory]
  bmreload:
    description: Reload BanManager config.
    usage: /bmreload
    permission: banmanager.reload

permissions:
  banmanager.*:
    default: op
    children:
      banmanager.warn: true
      banmanager.unwarn: true
      banmanager.kick: true
      banmanager.tempban: true
      banmanager.ban: true
      banmanager.ipban: true
      banmanager.unban: true
      banmanager.clearpunishments: true
      banmanager.history: true
      banmanager.reload: true
